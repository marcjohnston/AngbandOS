<app-master-layout>
  <ng-container *ngIf="isAuthenticated">
    <form [formGroup]="formGroup">
      <h2>Account Details</h2>
      <mat-label>Username</mat-label>
      <mat-form-field id="username">
        <input matInput formControlName="username" placeholder="Username" />
      </mat-form-field>
      <mat-label>Email Address</mat-label>
      <mat-form-field id="email-address">
        <input matInput formControlName="emailAddress" placeholder="Email Address" />
      </mat-form-field>
    </form>
    <ng-template ngFor [ngForOf]="messages" let-message>
      <div class="mat-error">{{message}}</div>
    </ng-template>
    <button mat-button mat-flat-button [routerLink]="['/accounts/change-password']" *ngIf="formGroup.disabled">Change Password</button>
    <button mat-button mat-flat-button (click)="onEditClick()" *ngIf="formGroup.disabled">Edit</button>
    <button mat-button mat-flat-button (click)="onSaveClick()" *ngIf="formGroup.enabled">Save</button>
    <button mat-button mat-flat-button (click)="onCancelClick()" *ngIf="formGroup.enabled">Cancel</button>
    <button mat-button mat-flat-button (click)="onResendConfirmationEmailClick()" *ngIf="!emailVerified && formGroup.disabled">Resend Confirmation Email</button>
  </ng-container>
  <ng-container *ngIf="!isAuthenticated">
    You are not logged in.
  </ng-container>
</app-master-layout>
